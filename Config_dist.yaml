# You must restart the bot if you modify this file. If you use the web display of the history, don’t
# forget Hypercorn and/or Uvicorn.

discord:
  bot_owner:              ""
  # Your Discord token. See https://discordpy.readthedocs.io/en/stable/discord.html
  token:                  ""
  bot_name:               "name for the bot to display in the history"
  server:                 id_server

mysqlclient:
  host:                   ""
  user:                   ""
  password:               ""
  database:               ""
  charset:                "utf8mb4"

mail:
  server:                 ""
  bot_address:            ""

history:
  active:                 True/False
  db_table:               "project_history"
  storage_folder:         "/path/to/bot_files"
  storage_url:            "https://domain.tld/bot_files"

irc_info:
  bot_owner:              ""
  nick:                   "MyBot"
  username:               "my_bot"
  real_name:              "My Bot"
  password:               ""
  quit_message:           "That’s the end of the beans"
  server:                 "irc.libera.chat"

users:
  db_table:               "project_users"

# If you don’t want to use the DB to manage users
irc_users:
  PutHereAnIrcNick1:
    # User1 isn’t bothered by having a Discord display name that is the same as their IRC nick, and
    # that their messages remain stored on Discord. Their avatar in the history will be the same as
    # their avatar on Discord
    discord_username:     ""
    discord_expiration:   "never"
  PutHereAnIrcNick2:
    # User2 doesn’t want to have their IRC nick as their Discord display name, and they’re content
    # to have their messages deleted on Discord after the default period of one year. Their avatar
    # on Discord and in the history will be generated with robohash.org
    discord_display_name: ""
  PutHereAnIrcNick3:
    # User3 doesn’t want to have their IRC nick as their Discord display name, and they want their
    # message deleted from Discord after one month. Also they want to specify an avatar.
    discord_display_name: ""
    discord_expiration:   "1m"
    avatar:               "https://domain.tld/path/to/Avatar.jpeg"

irc_bridges:
  chan1:
    discord_chan:         id_chan
    # If you want messages on Discord displayed as coming from the users instead of the bot.
    # See https://support.discord.com/hc/en-us/articles/228383668-Intro-to-Webhooks
    webhook: ""
  chan2:
    discord_chan:         id_chan
    webhook: ""
